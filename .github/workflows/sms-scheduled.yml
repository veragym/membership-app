name: SMS Scheduled Sender

on:
  schedule:
    # 매일 KST 10:00 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger send-sms-scheduled
        env:
          CRON_SECRET: ${{ secrets.SMS_CRON_SECRET }}
        run: |
          set -e
          curl -sS -f -X POST \
            "https://lrzffwawpoidimlrbfxe.supabase.co/functions/v1/send-sms-scheduled" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            -o response.json
          echo "Response:"
          cat response.json
